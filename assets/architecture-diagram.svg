<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <text x="700" y="50" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700">Wazuh &#8594; n8n &#8594; Gmail — Real-Time SOC Alert Pipeline</text>
  <text x="700" y="78" text-anchor="middle" fill="#94a3b8" font-size="14">Event-driven detection to notification, with deduplication and failure-recovery built in</text>

  <!-- Step 1: Endpoint -->
  <g>
    <rect x="40" y="140" width="230" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="155" y="168" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">STEP 1 — ENDPOINT</text>
    <text x="155" y="192" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600">Monitored Host</text>
    <text x="155" y="212" text-anchor="middle" fill="#cbd5e1" font-size="11">Linux manager + Windows agent</text>
    <text x="155" y="230" text-anchor="middle" fill="#cbd5e1" font-size="11">auth logs, sudo, FIM, SCA checks</text>
    <text x="155" y="248" text-anchor="middle" fill="#64748b" font-size="10">produces raw system events</text>
  </g>

  <line x1="270" y1="200" x2="330" y2="200" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Wazuh Manager -->
  <g>
    <rect x="330" y="140" width="230" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="445" y="168" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">STEP 2 — DETECTION</text>
    <text x="445" y="192" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600">Wazuh Manager</text>
    <text x="445" y="212" text-anchor="middle" fill="#cbd5e1" font-size="11">analysisd applies decoders + rules</text>
    <text x="445" y="230" text-anchor="middle" fill="#cbd5e1" font-size="11">assigns rule ID and severity level</text>
    <text x="445" y="248" text-anchor="middle" fill="#64748b" font-size="10">e.g. rule 5712, level 10</text>
  </g>

  <line x1="560" y1="200" x2="620" y2="200" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Integrator -->
  <g>
    <rect x="620" y="140" width="240" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="740" y="168" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">STEP 3 — FORWARD</text>
    <text x="740" y="192" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600">Wazuh Integrator</text>
    <text x="740" y="212" text-anchor="middle" fill="#cbd5e1" font-size="11">custom script triggers on level &#8805; 7</text>
    <text x="740" y="230" text-anchor="middle" fill="#cbd5e1" font-size="11">signs request with a secret token</text>
    <text x="740" y="248" text-anchor="middle" fill="#64748b" font-size="10">event-driven — no file polling</text>
  </g>

  <line x1="860" y1="200" x2="920" y2="200" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Webhook -->
  <g>
    <rect x="920" y="140" width="230" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="1035" y="168" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">STEP 4 — INGRESS</text>
    <text x="1035" y="192" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600">n8n Webhook</text>
    <text x="1035" y="212" text-anchor="middle" fill="#cbd5e1" font-size="11">header-token authentication</text>
    <text x="1035" y="230" text-anchor="middle" fill="#cbd5e1" font-size="11">responds 202 instantly</text>
    <text x="1035" y="248" text-anchor="middle" fill="#64748b" font-size="10">production URL, not test mode</text>
  </g>

  <!-- retry loop -->
  <path d="M 1035 260 C 1035 330, 740 330, 740 260" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>
  <text x="885" y="320" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">if unreachable: alert queued to disk</text>
  <text x="885" y="336" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">systemd timer retries every 60s until delivered</text>

  <!-- vertical connector down -->
  <line x1="1035" y1="260" x2="1035" y2="380" stroke="#4b5563" stroke-width="2"/>
  <line x1="1035" y1="380" x2="155" y2="380" stroke="#4b5563" stroke-width="2"/>
  <line x1="155" y1="380" x2="155" y2="420" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Normalize -->
  <g>
    <rect x="40" y="420" width="230" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="155" y="448" text-anchor="middle" fill="#facc15" font-size="13" font-weight="700">STEP 5 — NORMALIZE</text>
    <text x="155" y="472" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600">Field Extraction</text>
    <text x="155" y="492" text-anchor="middle" fill="#cbd5e1" font-size="11">flattens raw alert into a clean shape</text>
    <text x="155" y="510" text-anchor="middle" fill="#cbd5e1" font-size="11">maps rule level &#8594; severity label</text>
    <text x="155" y="528" text-anchor="middle" fill="#64748b" font-size="10">low / medium / high / critical</text>
  </g>

  <line x1="270" y1="480" x2="330" y2="480" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 6: Validate -->
  <g>
    <rect x="330" y="420" width="230" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="445" y="448" text-anchor="middle" fill="#facc15" font-size="13" font-weight="700">STEP 6 — VALIDATE</text>
    <text x="445" y="472" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600">Integrity Check</text>
    <text x="445" y="492" text-anchor="middle" fill="#cbd5e1" font-size="11">rejects malformed or incomplete events</text>
    <text x="445" y="510" text-anchor="middle" fill="#cbd5e1" font-size="11">confirms event ID, level, rule, agent</text>
    <text x="445" y="528" text-anchor="middle" fill="#64748b" font-size="10">stops bad data before it spreads</text>
  </g>

  <line x1="560" y1="480" x2="620" y2="480" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 7: Dedup -->
  <g>
    <rect x="620" y="420" width="240" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="740" y="448" text-anchor="middle" fill="#facc15" font-size="13" font-weight="700">STEP 7 — DEDUPLICATE</text>
    <text x="740" y="472" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600">Duplicate Filter</text>
    <text x="740" y="492" text-anchor="middle" fill="#cbd5e1" font-size="11">tracks event IDs already processed</text>
    <text x="740" y="510" text-anchor="middle" fill="#cbd5e1" font-size="11">repeated alerts are dropped silently</text>
    <text x="740" y="528" text-anchor="middle" fill="#64748b" font-size="10">one incident, one notification</text>
  </g>

  <line x1="860" y1="480" x2="920" y2="480" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 8: Severity Router -->
  <g>
    <rect x="920" y="420" width="230" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="1035" y="448" text-anchor="middle" fill="#facc15" font-size="13" font-weight="700">STEP 8 — ROUTE</text>
    <text x="1035" y="472" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600">Severity Router</text>
    <text x="1035" y="492" text-anchor="middle" fill="#cbd5e1" font-size="11">branches on severity label</text>
    <text x="1035" y="510" text-anchor="middle" fill="#cbd5e1" font-size="11">medium &#183; high &#183; critical</text>
    <text x="1035" y="528" text-anchor="middle" fill="#64748b" font-size="10">low-noise events never reach inbox</text>
  </g>

  <line x1="1035" y1="540" x2="1035" y2="580" stroke="#4b5563" stroke-width="2"/>
  <line x1="1035" y1="580" x2="445" y2="580" stroke="#4b5563" stroke-width="2"/>
  <line x1="445" y1="580" x2="445" y2="620" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 9: Format -->
  <g>
    <rect x="330" y="620" width="230" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="445" y="648" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">STEP 9 — FORMAT</text>
    <text x="445" y="672" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600">Email Builder</text>
    <text x="445" y="692" text-anchor="middle" fill="#cbd5e1" font-size="11">renders a readable HTML report</text>
    <text x="445" y="710" text-anchor="middle" fill="#cbd5e1" font-size="11">subject encodes severity + rule + agent</text>
    <text x="445" y="728" text-anchor="middle" fill="#64748b" font-size="10">analyst can triage from the subject line alone</text>
  </g>

  <line x1="560" y1="680" x2="620" y2="680" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 10: Gmail -->
  <g>
    <rect x="620" y="620" width="240" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="740" y="648" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">STEP 10 — NOTIFY</text>
    <text x="740" y="672" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600">Gmail Delivery</text>
    <text x="740" y="692" text-anchor="middle" fill="#cbd5e1" font-size="11">sends via authenticated OAuth2 account</text>
    <text x="740" y="710" text-anchor="middle" fill="#cbd5e1" font-size="11">branded sender identity</text>
    <text x="740" y="728" text-anchor="middle" fill="#64748b" font-size="10">analyst receives actionable alert in seconds</text>
  </g>

  <!-- legend -->
  <rect x="920" y="640" width="14" height="14" fill="#38bdf8"/>
  <text x="942" y="652" fill="#94a3b8" font-size="12">Detection &amp; forwarding</text>
  <rect x="920" y="665" width="14" height="14" fill="#facc15"/>
  <text x="942" y="677" fill="#94a3b8" font-size="12">Processing logic</text>
  <rect x="920" y="690" width="14" height="14" fill="#34d399"/>
  <text x="942" y="702" fill="#94a3b8" font-size="12">Output &amp; delivery</text>
  <line x1="920" y1="722" x2="934" y2="722" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="942" y="727" fill="#94a3b8" font-size="12">Failure recovery path</text>

  <text x="700" y="860" text-anchor="middle" fill="#475569" font-size="12">Total time from detection to inbox: 2&#8211;4 seconds under normal operation</text>
</svg>
